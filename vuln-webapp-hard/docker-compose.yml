services:

  gateway:
    image: nginx:1.27-alpine
    ports:
      - "127.0.0.1:9191:9191"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - orbitnet

  api:
    build: ./api
    expose:
      - "5001"
    networks:
      - orbitnet

  internal:
    build: ./internal
    expose:
      - "5002"
    networks:
      - orbitnet

networks:
  orbitnet:
    driver: bridge
