# Orbit Gateway — hard mode
# Port 9191, localhost only.

events {
    worker_connections 128;
}

http {
    # Cache zone
    proxy_cache_path /var/cache/nginx levels=1:2
                     keys_zone=orbit_cache:10m
                     max_size=100m
                     inactive=120m;

    # Default key excludes $http_x_forwarded_host deliberately.
    proxy_cache_key "$scheme$request_method$host$request_uri";

    # Rate-limit zones
    limit_req_zone $binary_remote_addr zone=burst:10m rate=6r/m;
    limit_req_zone $binary_remote_addr zone=discover:10m rate=30r/m;

    server {
        listen 127.0.0.1:9191;
        server_name orbit.local;

        # ── Auth routes ──
        location /auth/ {
            proxy_pass http://hard-api:5001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $http_x_forwarded_host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── API routes ──
        location /api/ {
            proxy_pass http://hard-api:5001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $http_x_forwarded_host;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Caching enabled for /api/ but key is still vulnerable
            proxy_cache orbit_cache;
            proxy_cache_valid 200 30s;
            add_header X-Cache-Status $upstream_cache_status;
            proxy_cache_bypass $http_x_purge;
        }

        # ── Everything else → api (will 404 or hit custom routes) ─
        location / {
            proxy_pass http://hard-api:5001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $http_x_forwarded_host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
