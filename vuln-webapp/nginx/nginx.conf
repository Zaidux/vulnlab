# Vulnerable Nginx config — cache poisoning lab
# Binds only to 127.0.0.1 (localhost-only).

events {
    worker_connections 128;
}

http {
    # ---- Cache zone ----
    proxy_cache_path /var/cache/nginx levels=1:2
                     keys_zone=vulncache:10m
                     max_size=100m
                     inactive=60m;

    # Default cache key — deliberately excludes $http_x_forwarded_host
    # so that different X-Forwarded-Host values map to the SAME key.
    proxy_cache_key "$scheme$request_method$host$request_uri";

    # Hide the cache status header normally
    proxy_hide_header X-Cache-Status;

    server {
        listen 127.0.0.1:8080;
        server_name vulnlab.local;

        # --- Static files (victim.html) ---
        location /victim.html {
            root /usr/share/nginx/html;
        }

        # --- Proxy to Flask backend ---
        location / {
            proxy_pass http://easy:5000;

            # Trusted proxy headers — intentionally forwards X-Forwarded-Host
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $http_x_forwarded_host;
            proxy_set_header X-Forwarded-Proto $scheme;

            # ---- Caching ----
            proxy_cache vulncache;
            proxy_cache_valid 200 302 60s;            # cache successes for 1 min
            proxy_cache_valid 404 10s;

            # Bypass cache when a special header is present (for attackers)
            proxy_cache_bypass $http_x_cache_bypass;

            # Add age header so we can observe cache hits
            add_header X-Cache-Status $upstream_cache_status;
        }
    }
}
